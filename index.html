<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Canvas &amp; Chain</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0A0A0F;font-family:Georgia,serif;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(212,168,83,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(212,168,83,.08) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
body::after{content:'';position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(212,168,83,.07) 0%,transparent 70%);pointer-events:none}
.w{position:relative;z-index:1;text-align:center;padding:1.5rem;max-width:420px;animation:fu .8s ease-out}
@keyframes fu{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}
.logo{width:160px;margin:0 auto 1.5rem;border-radius:8px;filter:drop-shadow(0 0 25px rgba(212,168,83,.4))}
h1{font-family:Cinzel,serif;font-size:2.2rem;font-weight:700;letter-spacing:.04em;margin-bottom:.4rem;background:linear-gradient(105deg,#b8862e,#D4A853 25%,#F5E6A3 40%,#FFF5D4 50%,#F5E6A3 60%,#D4A853 75%,#b8862e);background-size:250% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:sh 4s ease-in-out infinite}
@keyframes sh{0%,100%{background-position:100% 50%}50%{background-position:0% 50%}}
.sub{font-size:1rem;font-style:italic;color:rgba(245,240,232,.5);margin-bottom:1.2rem}
.tag{font-family:Cinzel,serif;font-size:.8rem;color:rgba(212,168,83,.4);letter-spacing:.3em;text-transform:uppercase;margin-bottom:2rem}
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.9rem 2.2rem;font-family:Cinzel,serif;font-size:.95rem;font-weight:700;letter-spacing:.06em;color:#0A0A0F;background:linear-gradient(135deg,#D4A853,#F5E6A3);border:none;border-radius:50px;cursor:pointer;text-decoration:none;transition:all .3s;box-shadow:0 4px 25px rgba(212,168,83,.3)}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 35px rgba(212,168,83,.5)}
footer{position:fixed;bottom:1.5rem;z-index:1;font-size:.7rem;color:rgba(212,168,83,.25);letter-spacing:.12em;text-transform:uppercase}
@media(max-width:480px){h1{font-size:1.8rem}.logo{width:130px}}
</style>
</head>
<body>
<main class="w">
<img class="logo" src="https://raw.githubusercontent.com/CTC8900-design/Canvas-and-Chain/main/logo.jpg" alt="Canvas and Chain">
<h1>Canvas &amp; Chain</h1>
<p class="sub">You made it. They'll bid on it.</p>
<p class="tag">Where Art Meets the Chain</p>
<a href="#" class="btn">Step In and Enjoy <span>&#8594;</span></a>
</main>
<footer>Powered by TON Blockchain</footer>
</body>
</html>
