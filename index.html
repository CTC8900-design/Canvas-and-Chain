<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas &amp; Chain</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A0A0F;--gold:#D4A853;--gold-lt:#E8C87A;--gold-dk:#B8912F;--txt:#F5F0E8}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center}
.grid{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background-image:
  linear-gradient(rgba(212,168,83,.05) 1px,transparent 1px),
  linear-gradient(90deg,rgba(212,168,83,.05) 1px,transparent 1px),
  linear-gradient(rgba(212,168,83,.08) 1px,transparent 1px),
  linear-gradient(90deg,rgba(212,168,83,.08) 1px,transparent 1px);
  background-size:40px 40px,40px 40px,200px 200px,200px 200px}
.grid::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background:radial-gradient(1.5px 1.5px at 0px 0px,rgba(212,168,83,.15),transparent),
  radial-gradient(1.5px 1.5px at 200px 200px,rgba(212,168,83,.12),transparent),
  radial-gradient(1px 1px at 100px 100px,rgba(212,168,83,.08),transparent);
  background-size:200px 200px}
.glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;
  background:radial-gradient(circle,rgba(212,168,83,.08) 0%,transparent 70%);z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;text-align:center;padding:2rem;max-width:480px;width:100%;
  animation:fadeUp 1s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.logo{width:90px;height:90px;margin:0 auto 2rem;filter:drop-shadow(0 0 20px rgba(212,168,83,.3))}
h1{font-family:'Cinzel',serif;font-size:2.8rem;font-weight:700;letter-spacing:.04em;margin-bottom:.5rem;
  background:linear-gradient(105deg,var(--gold-dk),var(--gold) 25%,var(--gold-lt) 40%,#FFF5D4 50%,var(--gold-lt) 60%,var(--gold) 75%,var(--gold-dk));
  background-size:250% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:shimmer 4s ease-in-out infinite}
@keyframes shimmer{0%{background-position:100% 50%}50%{background-position:0% 50%}100%{background-position:100% 50%}}
.sub{font-size:1.05rem;font-weight:300;font-style:italic;color:rgba(245,240,232,.5);margin-bottom:1.5rem}
.tag{font-family:'Cinzel',serif;font-size:.85rem;color:rgba(212,168,83,.4);letter-spacing:.35em;
  text-transform:uppercase;margin-bottom:2.5rem}
.btn{display:inline-flex;align-items:center;gap:.6rem;padding:1rem 2.5rem;font-family:'Cinzel',serif;
  font-size:1rem;font-weight:700;letter-spacing:.08em;color:var(--bg);
  background:linear-gradient(135deg,var(--gold),var(--gold-lt));border:none;border-radius:50px;cursor:pointer;
  transition:all .3s;text-decoration:none;box-shadow:0 4px 25px rgba(212,168,83,.3)}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 35px rgba(212,168,83,.5)}
.btn:active{transform:translateY(0)}
.arr{font-size:1.2rem;transition:transform .3s}
.btn:hover .arr{transform:translateX(4px)}
footer{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);z-index:1;
  display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:rgba(212,168,83,.3);
  letter-spacing:.1em;text-transform:uppercase}
@media(max-width:480px){h1{font-size:2rem}.sub{font-size:.95rem}.tag{font-size:.75rem}
  .btn{padding:.85rem 2rem;font-size:.9rem}.logo{width:72px;height:72px}}
</style>
</head>
<body>
<div class="grid"></div>
<div class="glow"></div>
<main class="wrap">
<svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<defs><linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#B8912F"/><stop offset="50%" stop-color="#E8C87A"/>
<stop offset="100%" stop-color="#D4A853"/></linearGradient></defs>
<line x1="30" y1="90" x2="45" y2="60" stroke="#B8912F" stroke-width="2.5" stroke-linecap="round"/>
<line x1="70" y1="90" x2="55" y2="60" stroke="#B8912F" stroke-width="2.5" stroke-linecap="round"/>
<line x1="50" y1="92" x2="50" y2="62" stroke="#B8912F" stroke-width="2" stroke-linecap="round"/>
<line x1="35" y1="30" x2="65" y2="30" stroke="#D4A853" stroke-width="2.5" stroke-linecap="round"/>
<rect x="33" y="30" width="34" height="30" rx="2" fill="none" stroke="#D4A853" stroke-width="2"/>
<rect x="38" y="38" width="24" height="9" rx="2" fill="url(#gg)" stroke="#E8C87A" stroke-width=".5"/>
<line x1="50" y1="47" x2="50" y2="56" stroke="#D4A853" stroke-width="2.5" stroke-linecap="round"/>
<ellipse cx="50" cy="57" rx="8" ry="3" fill="none" stroke="#D4A853" stroke-width="1.5"/>
</svg>
<h1>Canvas &amp; Chain</h1>
<p class="sub">You made it. They'll bid on it.</p>
<p class="tag">Where Art Meets the Chain</p>
<button class="btn" onclick="this.textContent='Connecting...';this.style.opacity='.7';setTimeout(function(){this.innerHTML='Step in and enjoy';this.style.opacity='1'}.bind(this),1500)">
Step in and enjoy <span class="arr">&rarr;</span></button>
</main>
<footer>
<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 9L12 22L22 9Z" stroke="rgba(212,168,83,.5)" stroke-width="1.5"/></svg>
Powered by TON Blockchain
</footer>
</body>
</html>
