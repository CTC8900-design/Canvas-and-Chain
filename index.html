<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bidtiful</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A0A0F;--gold:#D4A853;--gold-lt:#E8C87A;--gold-dk:#B8912F;--txt:#F5F0E8}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center}
.grid{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background-image:
linear-gradient(rgba(212,168,83,.05) 1px,transparent 1px),
linear-gradient(90deg,rgba(212,168,83,.05) 1px,transparent 1px),
linear-gradient(rgba(212,168,83,.08) 1px,transparent 1px),
linear-gradient(90deg,rgba(212,168,83,.08) 1px,transparent 1px);
background-size:40px 40px,40px 40px,200px 200px,200px 200px}
.grid::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;
background:radial-gradient(1.5px 1.5px at 0px 0px,rgba(212,168,83,.15),transparent),
radial-gradient(1.5px 1.5px at 200px 200px,rgba(212,168,83,.12),transparent),
radial-gradient(1px 1px at 100px 100px,rgba(212,168,83,.08),transparent);
background-size:200px 200px}
.glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;
background:radial-gradient(circle,rgba(212,168,83,.08) 0%,transparent 70%);z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;text-align:center;padding:2rem;max-width:480px;width:100%;
animation:fadeUp 1s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.logo{width:90px;height:90px;margin:0 auto 2rem;filter:drop-shadow(0 0 20px rgba(212,168,83,.3))}
h1{font-family:'Cinzel',serif;font-size:2.8rem;font-weight:700;letter-spacing:.04em;margin-bottom:.5rem;
background:linear-gradient(105deg,var(--gold-dk),var(--gold) 25%,var(--gold-lt) 40%,#FFF5D4 50%,var(--gold-lt) 60%,var(--gold) 75%,var(--gold-dk));
background-size:250% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
animation:shimmer 4s ease-in-out infinite}
@keyframes shimmer{0%{background-position:100% 50%}50%{background-position:0% 50%}100%{background-position:100% 50%}}
.tag{font-family:'Cinzel',serif;font-size:.85rem;color:rgba(212,168,83,.4);letter-spacing:.12em;
text-transform:none;margin-bottom:2.5rem}
.btn{display:inline-flex;align-items:center;gap:.6rem;padding:1rem 2.5rem;font-family:'Cinzel',serif;
font-size:1rem;font-weight:700;letter-spacing:.08em;color:var(--bg);
background:linear-gradient(135deg,var(--gold),var(--gold-lt));border:none;border-radius:50px;cursor:pointer;
transition:all .3s;text-decoration:none;box-shadow:0 4px 25px rgba(212,168,83,.3)}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 35px rgba(212,168,83,.5)}
.btn:active{transform:translateY(0)}
.arr{font-size:1.2rem;transition:transform .3s}
.btn:hover .arr{transform:translateX(4px)}
footer{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);z-index:1;
display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:rgba(212,168,83,.3);
letter-spacing:.1em;text-transform:uppercase}
@media(max-width:480px){h1{font-size:2rem}.tag{font-size:.9rem}
.btn{padding:.85rem 2rem;font-size:.9rem}.logo{width:72px;height:72px}}
</style>
</head>
<body>
<div class="grid"></div>
<div class="glow"></div>
<main class="wrap">
<svg class="logo" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Golden gavel logo with circuit frame">
  <defs>
    <linearGradient id="goldGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#B8912F"/>
      <stop offset="45%" stop-color="#E8C87A"/>
      <stop offset="100%" stop-color="#D4A853"/>
    </linearGradient>
    <linearGradient id="goldHighlight" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="ds" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(212,168,83,0.18)"/>
      <stop offset="60%" stop-color="rgba(212,168,83,0.06)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <style type="text/css"><![CDATA[
      .circuit-line{stroke:#D4A853;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .circuit-dot{fill:#E8C87A;stroke:#B8912F;stroke-width:1}
    ]]></style>
  </defs>

  <rect x="36" y="36" width="528" height="528" rx="18" fill="rgba(255,255,255,0.01)" stroke="rgba(212,168,83,0.06)" stroke-width="2"/>

  <g transform="translate(0,0)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path class="circuit-line" d="M80 80 H160 M200 80 H280 M320 80 H400 M440 80 H520"/>
    <circle class="circuit-dot" cx="160" cy="80" r="6"/>
    <circle class="circuit-dot" cx="280" cy="80" r="6"/>
    <circle class="circuit-dot" cx="400" cy="80" r="6"/>

    <path class="circuit-line" d="M520 120 V200 M520 240 V320 M520 360 V440"/>
    <circle class="circuit-dot" cx="520" cy="200" r="6"/>
    <circle class="circuit-dot" cx="520" cy="320" r="6"/>
    <circle class="circuit-dot" cx="520" cy="440" r="6"/>

    <path class="circuit-line" d="M520 520 H440 M400 520 H320 M280 520 H200 M160 520 H80"/>
    <circle class="circuit-dot" cx="440" cy="520" r="6"/>
    <circle class="circuit-dot" cx="320" cy="520" r="6"/>
    <circle class="circuit-dot" cx="200" cy="520" r="6"/>

    <path class="circuit-line" d="M80 520 V440 M80 400 V320 M80 280 V200"/>
    <circle class="circuit-dot" cx="80" cy="440" r="6"/>
    <circle class="circuit-dot" cx="80" cy="320" r="6"/>
    <circle class="circuit-dot" cx="80" cy="200" r="6"/>

    <path class="circuit-line" d="M110 110 l18 -18 M490 110 l-18 -18 M490 490 l-18 18 M110 490 l18 18"/>
  </g>

  <rect x="0" y="0" width="600" height="600" fill="url(#glow)" opacity="0.9"/>

  <g transform="translate(0,0)" filter="url(#ds)">
    <ellipse cx="300" cy="420" rx="110" ry="28" fill="url(#goldGrad)" opacity="0.95" stroke="#B8912F" stroke-width="2"/>
    <rect x="210" y="392" width="180" height="36" rx="8" fill="url(#goldGrad)" stroke="#B8912F" stroke-width="2"/>
    <rect x="220" y="384" width="160" height="12" rx="6" fill="url(#goldHighlight)" opacity="0.6"/>
  </g>

  <g transform="translate(0,0)" filter="url(#ds)">
    <rect x="330" y="260" width="160" height="44" rx="10" fill="url(#goldGrad)" stroke="#B8912F" stroke-width="2" transform="rotate(18 410 282)"/>
    <rect x="320" y="248" width="40" height="64" rx="8" fill="url(#goldGrad)" stroke="#B8912F" stroke-width="2" transform="rotate(18 340 280)"/>
    <rect x="470" y="270" width="18" height="18" rx="4" fill="url(#goldHighlight)" transform="rotate(18 479 279)"/>
  </g>

  <g transform="rotate(18 300 300)" filter="url(#ds)">
    <rect x="140" y="280" width="260" height="18" rx="9" fill="url(#goldGrad)" stroke="#B8912F" stroke-width="2"/>
    <rect x="140" y="280" width="260" height="6" rx="3" fill="url(#goldHighlight)" opacity="0.6"/>
    <g fill="#B8912F" opacity="0.9">
      <rect x="220" y="272" width="6" height="24" rx="3"/>
      <rect x="250" y="272" width="6" height="24" rx="3"/>
      <rect x="280" y="272" width="6" height="24" rx="3"/>
    </g>
  </g>

  <g opacity="0.9">
    <path d="M360 250 q40 -8 80 6" stroke="rgba(255,255,255,0.22)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M370 270 q30 -6 60 4" stroke="rgba(255,255,255,0.14)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  </g>

  <rect x="200" y="120" width="200" height="40" rx="20" fill="url(#goldHighlight)" opacity="0.12" transform="rotate(18 300 140)"/>
</svg>

<h1>Bidtiful</h1>
<p class="tag">Your Imagination minted, displayed and sold.</p>

<button class="btn" onclick="this.textContent='Connecting...';this.style.opacity='.7';setTimeout(function(){window.location.href='home.html'},1500)">
Step in and enjoy <span class="arr">&rarr;</span></button>
</main>
<footer>
<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 9L12 22L22 9Z" stroke="rgba(212,168,83,.5)" stroke-width="1.5"/></svg>
Powered by TON Blockchain
</footer>
</body>
      </html>
